services:
  server:
    ports: !reset []
    healthcheck:
      test: ["CMD", "/usr/src/app/server/bin/immich-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_interval: 10s
      start_period: 5m
    networks:
      default:
        ipv4_address: ${SERVER_IPV4}/${IPV4_NETMASK}

  microservices:
    healthcheck:
      test: ["CMD", "/usr/src/app/server/bin/immich-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_interval: 10s
      start_period: 5m

  machine-learning:
    healthcheck:
      test: ["CMD", "python3", "/usr/src/healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_interval: 10s
      start_period: 5m

  redis:
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 3
      start_interval: 10s
      start_period: 1m

  database:
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_interval: 20s
      start_period: 5m

networks:
  default:
    x-incus:
      ipv4.address: ${GATEWAY_IPV4}/${IPV4_NETMASK}
    x-incus-compose:
      network: ${NETWORK}

volumes:
  library:
    x-incus-compose:
      pool: ${UPLOAD_POOL}
