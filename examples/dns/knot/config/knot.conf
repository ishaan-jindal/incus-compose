server:
    rundir: "/rundir"
    user: knot:knot
    automatic-acl: on
    listen: 0.0.0.0@53
    listen: ::@53

log:
  - target: stderr
    any: info

database:
    storage: "/storage"

template:
  - id: default
    storage: "/storage"
    file: "%s.zone"

zone:
  - domain: example.com
    dnssec-signing: off
  - domain: 10.in-addr.arpa
    dnssec-signing: off
