services:
  database:
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready",
          "-U",
          "${POSTGRES_USER}",
          "-d",
          "${POSTGRES_DB}",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_interval: 1m
      start_period: 340s

  wiki:
    ports: !reset [] # do have static ip
    init: false # not supported
    networks:
      default:
        ipv4_address: 10.133.32.17

networks:
  default:
    x-incus:
      ipv4.nat: "true"
      ipv4.address: 10.133.32.1/24
