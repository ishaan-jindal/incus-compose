services:
  database:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_interval: 30s
      start_period: 90s
    networks:
      default:

  wiki:
    ports: !reset []
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"] # IPv4 only
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      default:
        ipv4_address: 10.133.32.17

networks:
  default:
    x-incus:
      ipv4.address: 10.133.32.1/24
    x-incus-compose:
      network: nwiki0
