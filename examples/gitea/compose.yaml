services:
  database:
    image: docker.io/library/postgres:${POSTGRES_VERSION}
    container_name: database
    environment:
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME}
    volumes:
      - database:/var/lib/postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${DATABASE_NAME} -U $${DATABASE_USER}"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_interval: 1m
      start_period: 4m

  gitea:
    image: docker.gitea.com/gitea:${GITEA_VERSION}
    container_name: gitea
    user: 1000:1000
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=database:5432
      - GITEA__database__NAME=${DATABASE_NAME}
      - GITEA__database__USER=${DATABASE_USER}
      - GITEA__database__PASSWD=${DATABASE_PASSWORD}
    volumes:
      - gitea-config:/etc/gitea
      - gitea-data:/var/lib/gitea
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy

volumes:
  database:
  gitea-config:
  gitea-data:
