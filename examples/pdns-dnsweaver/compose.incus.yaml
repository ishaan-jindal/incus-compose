services:
  pdns:
    ports: !reset []
    networks:
      default:
        x-incus:
          ipv4.address: "${PDNS_IPV4_ADDRESS}/${IPV4_NETMASK}"
          ipv4.gateway: "${IPV4_GATEWAY}"

  dnscrypt-proxy:
    networks:
      default:
        x-incus:
          ipv4.address: "${DNSCRYPT_IPV4_ADDRESS}/${IPV4_NETMASK}"
          ipv4.gateway: "${IPV4_GATEWAY}"

  pdns-admin:
    ports: !reset []
    networks:
      default:
        x-incus:
          ipv4.address: "${ADMIN_IPV4_ADDRESS}/${IPV4_NETMASK}"
          ipv4.gateway: "${IPV4_GATEWAY}"

networks:
  default:
    x-incus:
      ipv4.address: "${IPV4_GATEWAY}/${IPV4_NETMASK}"
    x-incus-compose:
      network: ${NETWORK}
