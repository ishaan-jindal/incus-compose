name: Lint

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: [self-hosted, incus-compose]
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: go mod tidy -diff
        run: go mod tidy -v -diff

      - name: golangci-lint
        # Writes the SARIF file even when issues are found, then exits non-zero.
        run: golangci-lint run --output.sarif.path=gl-code-quality-report.sarif

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gl-code-quality-report.sarif
          category: golangci-lint
