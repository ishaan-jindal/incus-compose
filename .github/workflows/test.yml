name: Test

on:
  push:
    branches:
      - main
  pull_request:

env:
  # https://stackoverflow.com/a/79780883/3368468
  GOTOOLCHAIN: "go1.26.0+auto"
  REPORTS_DIR: reports

jobs:
  lint:
    runs-on: [self-hosted, incus-compose]
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@v7
        with:
          go-version-file: go.mod
          cache: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: shellcheck **/*.sh
        run: shellcheck **/*.sh

      - name: go mod tidy -diff
        run: go mod tidy -v -diff

      - name: golangci-lint
        # Writes the SARIF file even when issues are found, then exits non-zero.
        run: golangci-lint run --output.sarif.path=gl-code-quality-report.sarif

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gl-code-quality-report.sarif
          category: golangci-lint

  test:
    needs: lint
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: default
            runs-on: [self-hosted, incus-compose, default]
          - name: custom-storage
            runs-on: [self-hosted, incus-compose, custom-storage]
          - name: custom-network
            runs-on: [self-hosted, incus-compose, custom-network]
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 120
    permissions:
      contents: read
      checks: write # publish JUnit results as a check run
    env:
      INCUS_REMOTE: local-https
      INCUS_COMPOSE_IMAGE_CACHE: incus-compose-tests-cache
      NO_COLOR: 1
      TEST_PROCS: 4
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Test
        run: |
          mkdir -p "$REPORTS_DIR"

          gotestsum \
            --packages="./..." \
            --junitfile "$REPORTS_DIR/junit.xml" \
            -- -count=1 -parallel "$TEST_PROCS" \
            -covermode=atomic -coverprofile="$REPORTS_DIR/cover.out" -v 2>&1

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Go Tests (${{ matrix.name }})
          path: ${{ env.REPORTS_DIR }}/junit.xml
          reporter: java-junit
          fail-on-error: false
