name: Test Release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # https://stackoverflow.com/a/79780883/3368468
  GOTOOLCHAIN: "go1.26.0+auto"
  REPORTS_DIR: reports

jobs:
  test-slow:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            runs-on: [self-hosted, incus-compose, default]
          - name: custom-storage
            runs-on: [self-hosted, incus-compose, custom-storage]
          - name: custom-network
            runs-on: [self-hosted, incus-compose, custom-network]
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 120
    permissions:
      contents: read
      checks: write # publish JUnit results as a check run
    env:
      INCUS_REMOTE: local-https
      INCUS_COMPOSE_IMAGE_CACHE: incus-compose-tests-cache
      NO_COLOR: 1
      INCUS_COMPOSE_TEST_SLOW: 1
      TEST_PROCS: 2
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cleanup
        run: |
          just purge-projects || true
          just purge-networks || true
          mkdir -p "$REPORTS_DIR"

      - name: Test
        run: |
          gotestsum \
            --packages="./..." \
            --jsonfile "$REPORTS_DIR/result.json" \
            --junitfile "$REPORTS_DIR/junit.xml" \
            -- -count=1 -parallel "$TEST_PROCS" \
            -covermode=atomic -v 2>&1

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Go Tests (${{ matrix.name }})
          path: ${{ env.REPORTS_DIR }}/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Publish coverage
        if: always()
        run: |
          go-testreport -input "$REPORTS_DIR/result.json" >> $GITHUB_STEP_SUMMARY

  test-example:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Hugo
            args: "-run TestExample/hugo"
          - name: Immich
            args: "-run TestExample/immich -timeout 20m"
          - name: ManyDependencies
            args: "-run TestExample/many-dependencies"
          - name: WikiJS
            args: "-run TestExample/wikijs"
    runs-on: [self-hosted, incus-compose]
    timeout-minutes: 60
    permissions:
      contents: read
      checks: write # publish JUnit results as a check run
    env:
      INCUS_REMOTE: local-https
      INCUS_COMPOSE_IMAGE_CACHE: incus-compose-tests-cache
      NO_COLOR: 1
      INCUS_COMPOSE_TEST_SLOW: 1
      INCUS_COMPOSE_TEST_EXAMPLES: 1
      TEST_PROCS: 2
      EXAMPLE: TestExampleHugo
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cleanup
        run: |
          just purge-projects || true
          just purge-networks || true

      - name: Test
        run: |
          mkdir -p "$REPORTS_DIR"

          gotestsum \
            --packages="./examples/..." \
            --junitfile "$REPORTS_DIR/junit.xml" \
            -- -count=1 -parallel "$TEST_PROCS" -timeout 20m \
               ${{ matrix.args }} 2>&1

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Go Tests (${{ matrix.name }})
          path: ${{ env.REPORTS_DIR }}/junit.xml
          reporter: java-junit
          fail-on-error: false
