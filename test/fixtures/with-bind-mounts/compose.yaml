name: with-bind-mounts

services:
  file-web:
    image: docker.io/nginxinc/nginx-unprivileged:alpine-slim
    environment:
      NGINX_ENTRYPOINT_WORKER_PROCESSES_AUTOTUNE: 1
    x-incus:
      limits.cpu: 1
    volumes:
      - ./file.html:/usr/share/nginx/html/index.html

  dir-web:
    image: docker.io/nginxinc/nginx-unprivileged:alpine-slim
    environment:
      NGINX_ENTRYPOINT_WORKER_PROCESSES_AUTOTUNE: 1
    x-incus:
      limits.cpu: 1
    volumes:
      - ./html:/usr/share/nginx/html
