name: with-external-network

services:
  web:
    image: docker.io/nginx:alpine
    environment:
      NGINX_ENTRYPOINT_WORKER_PROCESSES_AUTOTUNE: 1
    x-incus:
      limits.cpu: 1
    networks:
      - named-override

networks:
  named-override:
    external: true
    x-incus-compose:
      network: incusbr0
