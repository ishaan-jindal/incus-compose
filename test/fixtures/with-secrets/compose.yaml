services:
  app:
    image: docker.io/library/busybox:glibc
    secrets:
      - demo_secret
      - db_password
      - source: api_key
        target: /app/secrets/api.key
        uid: "1000"
        gid: "1000"
        mode: 0o444

secrets:
  db_password:
    file: ./db_password.txt
  api_key:
    file: ./api_key.txt
  demo_secret:
    environment: DEMO_SECRET
